name: 🤖 Android APK Build (Full)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      
    - name: ☕ JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 📱 Android SDK
      uses: android-actions/setup-android@v3
      
    - name: 🔧 chmod
      run: chmod +x gradlew
      
    - name: 🏗️ Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      
    - name: 📦 Verify APK
      run: |
        echo "Checking APK..."
        find . -name "*.apk" -ls
        ls -lh app/build/outputs/apk/debug/ || true
        
    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PlantLog-Full-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        if-no-files-found: error
        
    - name: 📊 Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "✅ Full APK generated!" >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/debug/app-debug.apk >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ APK not found" >> $GITHUB_STEP_SUMMARY
        fi
