name: 🤖 Android APK Build

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 📱 Set up Android SDK
      uses: android-actions/setup-android@v3
      
    - name: 🔧 Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: 🏗️ Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build.log
      
    - name: 📊 Upload Build Log (Always)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-log
        path: build.log
        retention-days: 7
        
    - name: 📦 Verify APK exists
      run: |
        echo "Checking for APK files..."
        ls -lh app/build/outputs/apk/debug/ || true
        find app/build/outputs -name "*.apk" || true
        
    - name: 📦 Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: PlantLog-debug
        path: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: warn
        
    - name: 📊 Build Summary
      if: always()
      run: |
        echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if ls app/build/outputs/apk/debug/*.apk 1>/dev/null 2>&1; then
          echo "✅ APK generated" >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/debug/*.apk >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ APK not found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Log (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 build.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
