name: 🤖 Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.configureondemand=false"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      
    - name: ☕ Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 📱 Setup Android SDK
      run: |
        export ANDROID_SDK_ROOT=$HOME/android-sdk
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
        unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools/
        mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
        export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools
        yes | sdkmanager --licenses 2>&1 | tail -5
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -5
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
      
    - name: 🔧 Setup Gradle
      uses: gradle/gradle-build-action@v3
      
    - name: 🔧 chmod
      run: chmod +x gradlew
      
    - name: 🏗️ Build Debug APK
      run: |
        echo "=== Starting Gradle Build ==="
        echo "Java version:"
        java -version
        echo "Gradle version:"
        ./gradlew --version
        echo "=== Running assembleDebug ==="
        ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log
        
    - name: 📦 Verify APK
      if: always()
      run: |
        echo "=== Checking build outputs ==="
        find . -name "*.apk" -ls 2>/dev/null || echo "No APK found"
        ls -lh app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug APK directory not found"
        
    - name: 📤 Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: PlantLog-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        if-no-files-found: error
        
    - name: 📊 Summary
      if: always()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
          echo "✅ Debug APK generated!" >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/debug/app-debug.apk >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ APK not found" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Log (last 100 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 build.log >> $GITHUB_STEP_SUMMARY || echo "No build log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi
