name: 🤖 Android APK Build (Release)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      
    - name: ☕ JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 📱 Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
      
    - name: 🔧 chmod
      run: chmod +x gradlew
      
    - name: 🏗️ Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      
    - name: 📦 Verify APK
      run: |
        echo "Checking APK..."
        find . -name "*.apk" -ls
        ls -lh app/build/outputs/apk/release/ || true
        
    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: PlantLog-Release-APK
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
        if-no-files-found: error
        
    - name: 📊 Summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
          echo "✅ Release APK generated!" >> $GITHUB_STEP_SUMMARY
          ls -lh app/build/outputs/apk/release/app-release-unsigned.apk >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ APK not found" >> $GITHUB_STEP_SUMMARY
        fi
